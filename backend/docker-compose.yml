services:
  postgres:
    image: postgres:16-alpine
    container_name: vmm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: votomusicamundial
      POSTGRES_USER: votomusicamundial
      POSTGRES_PASSWORD: votomusicamundial
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votomusicamundial -d votomusicamundial"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vmm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: vmm-api
    restart: unless-stopped
    env_file: .env
    command: npm run start
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: vmm-worker
    restart: unless-stopped
    env_file: .env
    command: npm run start:worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
